name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python lint + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install pyyaml + ruff
        run: python3 -m pip install 'pyyaml==6.0.2' 'ruff==0.9.10'
      - name: Compile-check every Python source
        run: |
          set -euo pipefail
          mapfile -t pyfiles < <(git ls-files '*.py')
          if [ "${#pyfiles[@]}" -eq 0 ]; then
            echo "(no Python files found)"
            exit 0
          fi
          python3 -m py_compile "${pyfiles[@]}"
      - name: Ruff lint
        run: ruff check .

  vendor-drift:
    name: Vendored engine matches claude-platform pin
    runs-on: ubuntu-latest
    # Guards the parity contract that the original vendoring commit
    # asserts: codex's sync engine + test suite must match
    # `loomantix/claude-platform`'s at a deliberately-pinned SHA.
    # Without this gate, a hardening fix landing on claude leaves codex
    # silently behind — every dual-source consumer (activescribe,
    # activetime, activedepo, platform) gets inconsistent enforcement
    # depending on which mirror it pulled from on a given day.
    #
    # Updating `CLAUDE_PIN_SHA` MUST happen in the same PR as the file
    # updates that match it. A bumped SHA without matching file content
    # fails the gate intentionally so a reviewer notices the drift.
    env:
      CLAUDE_PIN_SHA: 3bd7dc0e97b5c7278913e04105741877e8a6c8b7
      CLAUDE_REPO: loomantix/claude-platform
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Diff vendored files against claude-platform pin
        run: |
          set -euo pipefail
          base="https://raw.githubusercontent.com/${CLAUDE_REPO}/${CLAUDE_PIN_SHA}"
          # Keep this list in sync with the vendoring commit. A new
          # file vendored from claude-platform that doesn't appear
          # below is invisible to the gate — that's a deliberate
          # "explicit > implicit" choice, but it does mean adding a
          # new test file requires updating this list too.
          files=(
            scripts/sync-engine.py
            scripts/create-signed-commit.py
            tests/__init__.py
            tests/conftest.py
            tests/test_sync_engine.py
            tests/test_sync_engine_integration.py
            tests/test_create_signed_commit.py
          )
          mkdir -p /tmp/upstream
          for f in "${files[@]}"; do
            curl -fsSL "${base}/${f}" -o "/tmp/upstream/$(echo "$f" | tr '/' '_')"
          done
          drift=0
          for f in "${files[@]}"; do
            up="/tmp/upstream/$(echo "$f" | tr '/' '_')"
            if ! diff -q "$f" "$up" > /dev/null; then
              echo "::error file=$f::diverges from ${CLAUDE_REPO}@${CLAUDE_PIN_SHA}"
              diff -u "$up" "$f" | head -60 || true
              drift=1
            fi
          done
          if [ "$drift" -ne 0 ]; then
            echo "Update CLAUDE_PIN_SHA in this workflow (atomically with the file content) to ack the drift." >&2
            exit 1
          fi
          echo "OK: ${#files[@]} vendored files match ${CLAUDE_REPO}@${CLAUDE_PIN_SHA}"

  python-types-and-tests:
    name: Python types + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          # Cache the resolved wheel cohort against the pinned-tool list
          # below — the pins never drift within a PR, so the cache hits
          # on every iter-fix push (~15s saved per re-run).
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install pinned tooling
        run: |
          python3 -m pip install \
            'mypy==1.13.0' \
            'pyyaml==6.0.2' \
            'types-PyYAML==6.0.12.20240917' \
            'pytest==8.3.4' \
            'pytest-cov==6.0.0'
      - name: mypy --strict (config from pyproject.toml)
        run: python3 -m mypy
      - name: Configure git identity (parse_status tests use a fixture git repo)
        run: |
          git config --global user.email "ci@example.invalid"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
      - name: Run pytest + write coverage data
        run: python3 -m pytest tests/ --cov --cov-report=term-missing -ra
      # Per-file gate matches the security contract: a future refactor
      # that spikes one file's coverage can't paper over a regression
      # in the other. The `test -f` precondition is load-bearing —
      # `coverage report --include=<missing>` exits 0 with "No data to
      # report", silently passing the gate if a file gets renamed.
      - name: Coverage gate — sync-engine.py >=80%
        run: |
          test -f scripts/sync-engine.py
          python3 -m coverage report --include='scripts/sync-engine.py' --fail-under=80
      - name: Coverage gate — create-signed-commit.py >=80%
        run: |
          test -f scripts/create-signed-commit.py
          python3 -m coverage report --include='scripts/create-signed-commit.py' --fail-under=80

  shell:
    name: Shell syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: bash -n every shell script
        run: |
          set -euo pipefail
          mapfile -t shfiles < <(git ls-files '*.sh')
          for f in "${shfiles[@]}"; do
            bash -n "$f"
          done
      - name: shellcheck (warnings allowed; errors fail)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: error

  yaml:
    name: YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - run: python3 -m pip install 'pyyaml==6.0.2'
      - name: Parse every YAML file
        run: |
          set -euo pipefail
          mapfile -t ymlfiles < <(git ls-files '*.yml' '*.yaml')
          for f in "${ymlfiles[@]}"; do
            # `.template` files often contain literal `<placeholders>` that
            # are still valid YAML — parse-only check is sufficient.
            python3 -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))" "$f"
          done

  format:
    name: Prettier check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.29.3
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Prettier --check
        run: pnpm format:check

  sync-targets:
    name: sync-targets.yml matches schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - run: python3 -m pip install 'pyyaml==6.0.2'
      - name: Validate the canonical manifest parses + has expected shape
        run: |
          python3 - <<'PY'
          import yaml, sys
          doc = yaml.safe_load(open('scripts/sync-targets.yml'))
          targets = doc.get('targets')
          assert isinstance(targets, list) and targets, "targets must be a non-empty list"
          for t in targets:
              assert isinstance(t, dict), f"non-mapping target: {t!r}"
              if t.get('delete'):
                  assert 'destination' in t, f"delete target missing destination: {t!r}"
              else:
                  assert 'source' in t and 'destination' in t, f"copy target missing keys: {t!r}"
          print(f"OK: {len(targets)} targets")
          PY
