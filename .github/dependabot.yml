# Dependabot keeps SHA-pinned third-party Actions current. Without this,
# pins go stale silently when upstream ships security fixes.
#
# Coverage limitation: Dependabot's github-actions ecosystem scans
# `.github/workflows/*.{yml,yaml}` and nothing else. The sync workflow
# template (`.github/workflows/sync-from-upstream.yml.template`) falls
# outside that path because the `.yml.template` extension is not
# recognized. It still needs refresh when upstream Actions release —
# run `scripts/check-action-pin-drift.sh` to detect when its pinned
# SHAs no longer match what the commented version tag resolves to
# upstream.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # Bundle into one weekly PR — less noise, same security signal.
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - dependencies
